<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>招标助手 - 登录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <!-- 顶部Hero区域 -->
    <div class="login-hero">
      <h1>🏗️ 招标助手</h1>
      <p>工程招标信息智能管理系统</p>
    </div>

    <!-- 登录/注册卡片 -->
    <div class="login-card">
      <!-- 标签切换 -->
      <div class="login-tabs">
        <button class="login-tab active" id="tab-login" onclick="switchTab('login')">登录</button>
        <button class="login-tab" id="tab-register" onclick="switchTab('register')">注册</button>
      </div>

      <!-- 登录表单 -->
      <div id="login-form">
        <div class="login-input-group">
          <label>用户名/手机号</label>
          <input type="text" id="username" placeholder="请输入用户名或手机号">
        </div>
        <div class="login-input-group">
          <label>密码</label>
          <input type="password" id="password" placeholder="请输入密码">
        </div>
        <button class="login-btn" onclick="login()">登 录</button>
      </div>

        <!-- 注册表单 -->
        <div id="register-form" style="display:none;">
          <div class="login-input-group">
            <label>用户名（可选）</label>
            <input type="text" id="reg-username" placeholder="用于登录，可选">
          </div>
          <div class="login-input-group">
            <label>手机号（可选）</label>
            <input type="tel" id="reg-phone" placeholder="用于登录，可选">
          </div>
          <p style="font-size:11px;color:#999;margin:-8px 0 8px 0;">用户名和手机号至少填写一个</p>
          <div class="login-input-group">
            <label>密码 *</label>
            <input type="password" id="reg-password" placeholder="至少6位">
          </div>
          <div class="login-input-group">
            <label>公司名称（可选）</label>
            <input type="text" id="reg-company" placeholder="你的公司名称">
          </div>
          <button class="login-btn" onclick="register()">注 册</button>
        </div>

      <div id="message" class="login-message"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
